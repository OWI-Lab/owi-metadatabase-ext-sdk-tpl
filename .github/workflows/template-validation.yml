name: Template Validation

on:
  push:
  pull_request:
    branches: ["main"]

concurrency:
  group: template-validation-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  render-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python "3.14"
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Validate rendered template
        run: python scripts/validate_template.py